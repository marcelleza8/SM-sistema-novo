services:
  node:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile.node
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development

  build:
    profiles:
      - build
    image: node:18
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    # NODE_ENV=production faz o npm omitir devDependencies (vite incluso);
    # --include=dev garante o vite disponível para o build.
    command: sh -c "npm ci --include=dev && npm run build"
    environment:
      - NODE_ENV=production
